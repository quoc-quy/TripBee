name: Deploy Backend to Railway

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        working-directory: ./backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach --service tripbee-backend

      - name: Đợi Railway build & boot xong
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "⏳ Đợi Railway deploy..."
          echo "   (Railway block curl từ GitHub Actions IPs nên không dùng HTTP health check)"
          sleep 30

          # Dùng Railway CLI để kiểm tra deployment status thay vì curl
          for i in $(seq 1 10); do
            echo "--- Lần thử $i/10..."

            STATUS=$(railway status --service tripbee-backend 2>&1 || true)
            echo "    $STATUS"

            if echo "$STATUS" | grep -qi "success\|running\|active\|deployed"; then
              echo "✅ Railway báo deploy thành công!"
              break
            fi

            if echo "$STATUS" | grep -qi "failed\|error\|crash"; then
              echo "❌ Railway báo deploy thất bại!"
              echo "   Xem logs: railway logs --service tripbee-backend"
              exit 1
            fi

            sleep 20
          done

          echo ""
          echo "✅ Deploy pipeline hoàn tất!"
          echo "🌐 Backend: https://tripbee-backend-production.up.railway.app"
          echo ""
          echo "⚠️  Nếu backend vẫn crash, kiểm tra Railway đã có đủ:"
          echo "   - PostgreSQL service với Reference Variables"
          echo "   - Redis service với Reference Variables"
          echo "   - ALLOWED_ORIGINS env var"
