name: Deploy Backend to Railway

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        working-directory: ./backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach --service tripbee-backend

      - name: Xác nhận deploy đã được gửi lên Railway
        run: |
          echo ""
          echo "✅ Code đã được gửi lên Railway thành công!"
          echo "🌐 Backend URL: https://tripbee-backend-production.up.railway.app"
          echo ""
          echo "📋 Railway sẽ tự build & deploy trong vài phút tiếp theo."
          echo "   Theo dõi tiến trình tại: https://railway.app"
          echo ""
          echo "⚠️  Lưu ý: Railway block HTTP request từ GitHub Actions IPs,"
          echo "   nên workflow này không thể tự health check được."
          echo "   Hãy kiểm tra Railway Dashboard để xác nhận backend đang chạy."
