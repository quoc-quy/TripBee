name: Deploy Backend to Railway

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        working-directory: ./backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach --service tripbee-backend

      - name: Health Check với retry (đợi Railway boot xong)
        run: |
          echo "⏳ Bắt đầu health check — Railway cần ~90-120 giây để build & boot Spring Boot..."

          MAX_RETRIES=10
          RETRY_INTERVAL=30
          SUCCESS=false

          for i in $(seq 1 $MAX_RETRIES); do
            echo "--- Lần thử $i/$MAX_RETRIES (đợi ${RETRY_INTERVAL}s)..."
            sleep $RETRY_INTERVAL

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://tripbee-backend-production.up.railway.app/api/tours \
              --max-time 15 \
              -H "Accept: application/json" \
              2>/dev/null || echo "000")

            echo "    HTTP Status: $STATUS"

            # 200 = OK public endpoint
            # 403 = Spring Security chặn (backend đang chạy, cần auth) → cũng là THÀNH CÔNG
            # 401 = Unauthorized (backend chạy, cần token) → cũng là THÀNH CÔNG
            # 502/503/000 = Railway chưa boot xong hoặc crash → tiếp tục retry
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "403" ] || [ "$STATUS" = "401" ]; then
              echo "✅ Backend đang chạy! (HTTP $STATUS)"
              SUCCESS=true
              break
            fi

            echo "    ⚠️  Backend chưa sẵn sàng (HTTP $STATUS), thử lại..."
          done

          if [ "$SUCCESS" = "false" ]; then
            echo ""
            echo "❌ Backend không phản hồi sau $((MAX_RETRIES * RETRY_INTERVAL))s"
            echo "   Kiểm tra Railway logs tại: https://railway.app"
            echo "   Các nguyên nhân thường gặp:"
            echo "   1. SPRING_DATASOURCE_URL chưa set → kết nối PostgreSQL fail"
            echo "   2. SPRING_DATA_REDIS_HOST chưa set → Redis connection fail"
            echo "   3. JAR build lỗi → xem build logs trên Railway"
            exit 1
          fi
