name: Deploy Backend to Railway

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Cài đặt Railway CLI
        run: npm install -g @railway/cli

      - name: 3. Deploy backend lên Railway
        working-directory: ./backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: railway up --detach --service tripbee-backend

      - name: 4. Thông báo kết quả
        run: |
          echo "✅ Backend source đã gửi lên Railway!"
          echo "🌐 URL: https://tripbee-backend-production.up.railway.app"
          echo "📋 Railway đang build từ Dockerfile — theo dõi tại https://railway.app"
