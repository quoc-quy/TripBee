name: Deploy Backend to Railway

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        working-directory: ./backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach --service tripbee-backend

      - name: Health Check (đợi Railway deploy xong)
        run: |
          echo "⏳ Đợi 60 giây để Railway build và deploy..."
          sleep 60
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://tripbee-backend-production.up.railway.app/api/destinations \
            --max-time 30)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "401" ] || [ "$STATUS" = "403" ]; then
            echo "✅ Backend đang chạy bình thường! (Status: $STATUS)"
          else
            echo "❌ Backend có vấn đề! (Status: $STATUS)"
            exit 1
          fi
