name: Deploy Backend to Railway

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Cài đặt Railway CLI
        run: npm install -g @railway/cli

      - name: 3. Deploy backend lên Railway
        working-directory: ./backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          railway up --detach --service tripbee-backend

      - name: 4. Thông báo kết quả
        run: |
          echo ""
          echo "✅ Backend source code đã gửi lên Railway thành công!"
          echo "🌐 Backend URL: https://tripbee-backend-production.up.railway.app"
          echo ""
          echo "📋 Railway đang tự build & deploy từ Dockerfile..."
          echo "   Theo dõi tại: https://railway.app/project/${{ secrets.RAILWAY_PROJECT_ID }}"
          echo ""
          echo "⚠️  Quan trọng: Đảm bảo các biến môi trường sau đã được set trên Railway:"
          echo "   - SPRING_DATASOURCE_URL (từ PostgreSQL plugin)"
          echo "   - SPRING_DATASOURCE_USERNAME"
          echo "   - SPRING_DATASOURCE_PASSWORD"
          echo "   - SPRING_DATA_REDIS_HOST (từ Redis plugin)"
          echo "   - SPRING_DATA_REDIS_PORT"
          echo "   - SPRING_DATA_REDIS_PASSWORD"
          echo "   - ALLOWED_ORIGINS=https://tripbeefrontend.vercel.app"
          echo "   - JWT_SECRET_KEY"
