name: Deploy Frontend to Vercel
on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Cài đặt Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: 3. Cài đặt thư viện (clean install để fix rollup native deps)
        run: |
          rm -f package-lock.json
          npm install

      - name: 4. Build với VITE_API_URL
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: 5. Tạo vercel.json trong dist (serve static + fix React Router)
        run: |
          cat > ./dist/vercel.json << 'EOF'
          {
            "buildCommand": null,
            "installCommand": null,
            "framework": null,
            "rewrites": [
              { "source": "/(.*)", "destination": "/index.html" }
            ]
          }
          EOF

      - name: 6. Deploy thư mục dist lên Vercel
        run: |
          npm install -g vercel@latest
          vercel deploy --prod --yes \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --cwd=./dist
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
