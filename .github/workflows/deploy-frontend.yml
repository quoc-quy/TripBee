name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Cài đặt Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 3. Cài đặt Vercel CLI global
        run: npm install -g vercel@latest

      - name: 4. Cài đặt dependencies frontend
        working-directory: ./frontend
        run: |
          rm -f package-lock.json
          npm install --platform=linux --arch=x64 --include=optional

      - name: 5. Build với vercel build
        run: |
          vercel build --prod --yes \
            --cwd ./frontend \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: 6. Deploy lên Vercel Production
        run: |
          vercel deploy --prebuilt --prod \
            --cwd ./frontend \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 7. Thông báo kết quả
        run: echo "✅ Frontend deployed tới https://tripbeefrontend.vercel.app"
