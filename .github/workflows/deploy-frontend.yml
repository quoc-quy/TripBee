name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: 1. Checkout code
        uses: actions/checkout@v4

      - name: 2. Cài đặt Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 3. Cài đặt dependencies (clean install)
        run: |
          rm -f package-lock.json
          npm install --platform=linux --arch=x64 --include=optional

      - name: 4. Build production bundle
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: 5. Pull Vercel project settings
        run: |
          npm install -g vercel@latest
          vercel pull --yes --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 6. Deploy prebuilt dist lên Vercel (Production)
        run: |
          vercel deploy --prebuilt --prod \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 7. Thông báo kết quả
        run: |
          echo "✅ Frontend đã deploy thành công lên Vercel!"
          echo "🌐 URL: https://tripbeefrontend.vercel.app"
