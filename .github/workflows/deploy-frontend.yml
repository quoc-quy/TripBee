name: Deploy Frontend to Vercel

# Khi nào thì chạy kịch bản này?
on:
  push:
    branches:
      - main # Chạy khi có code đẩy lên nhánh main
    paths:
      - 'frontend/**' # CHỈ chạy khi thư mục frontend có sự thay đổi (giúp tiết kiệm tài nguyên)

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Clone code từ GitHub về máy chủ ảo
        uses: actions/checkout@v3

      - name: 2. Cài đặt môi trường Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 3. Cài đặt Vercel CLI
        run: npm install --global vercel@latest

      - name: 4. Lấy thông tin dự án từ Vercel
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 5. Build code Frontend
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: 6. Deploy lên Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
