services:
  backend:
    build: ./backend
    container_name: tripbee-be
    ports:
      - '8080:8080'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://host.docker.internal:5432/tripbee_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=93201017

  frontend:
    build: ./frontend
    container_name: tripbee-fe
    ports:
      - '3000:80'
    depends_on:
      - backend
